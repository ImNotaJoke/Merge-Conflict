<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <script type="module" src="./src/main.ts" defer></script>
    <title>Merge Conflict</title>
</head>
<body>
    <header>
        <p id="settingsBtn" class="parameter-icon settingsBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="settings-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></p>
    </header>
    <div class="video-container">
        <video id="bgVideo" autoplay muted loop playsinline class="back-video">
            <source src="assets/DoomguyIsabelle.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
        <label for="volumeControl">Volume de la musique :</label>
        <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
    </div>
    <section class="main-menu">
        <h1>Merge Conflict</h1>
        
        <div class="button-container">
            <input type="text" class="pseudo" placeholder="Entrez votre pseudo...">
            <div class="button-row">
                <button class="game-btn solo">Solo</button>
                <button class="game-btn coop">Coop</button>
            </div>
            <button class="game-btn leaderboard">Leaderboard</button>
        </div>

        <footer>
            <form class="credits-form">
                <button type="submit" class="credits">Crédits</button>
            </form>
        </footer>
    </section>
    <section class="credits-section hidden">
        <h1>Crédits</h1>
        <table>
            <thead>
                <tr>
                    <th>Prénom</th>
                    <th>Nom</th>
                    <th>Surnom</th>
                    <th>Groupe</th>
                    <th>Jeu préféré</th>
                    <th>% de la note</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </section>
</body>
</html>
